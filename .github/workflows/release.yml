name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-ubuntu:
    name: Release Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            rpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Tauri and Upload Release Assets
        if: github.event_name != 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Skill Studio ${{ github.ref_name }}
          releaseDraft: false
          prerelease: true
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true

      - name: Generate checksums
        shell: bash
        run: |
          cd src-tauri/target/release/bundle
          find . -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) -exec sha256sum {} \; > sha256sums-linux.txt
          cat sha256sums-linux.txt

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/sha256sums-linux.txt
          body_path: docs/release-notes.md
          tag_name: ${{ github.ref_name }}
          prerelease: true
        if: github.event_name != 'workflow_dispatch'

  release-windows:
    name: Release Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Tauri and Upload Release Assets
        if: github.event_name != 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Skill Studio ${{ github.ref_name }}
          releaseDraft: false
          prerelease: true
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true

      - name: Generate checksums
        shell: bash
        run: |
          cd src-tauri/target/release/bundle
          find . -type f \( -name "*.msi" -o -name "*.exe" \) -exec sha256sum {} \; > sha256sums-windows.txt
          cat sha256sums-windows.txt

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/sha256sums-windows.txt
          body_path: docs/release-notes.md
          tag_name: ${{ github.ref_name }}
          prerelease: true
        if: github.event_name != 'workflow_dispatch'

  release-macos:
    name: Release macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Tauri and Upload Release Assets
        if: github.event_name != 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Skill Studio ${{ github.ref_name }}
          releaseDraft: false
          prerelease: true
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true

      - name: Generate checksums
        shell: bash
        run: |
          cd src-tauri/target/release/bundle
          find . -type f \( -name "*.dmg" -o -name "*.tar.gz" \) -exec sha256sum {} \; > sha256sums-macos.txt
          cat sha256sums-macos.txt

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/sha256sums-macos.txt
          body_path: docs/release-notes.md
          tag_name: ${{ github.ref_name }}
          prerelease: true
        if: github.event_name != 'workflow_dispatch'
