name: Skill Studio Pro Public Beta

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  supply-chain:
    name: Verify release supply chain
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-07-16
      - name: Restore audited upstream remote contract
        run: git remote add upstream https://github.com/liu673/skill-studio.git
      - name: Install locked dependencies
        run: npm ci
      - name: Verify SBOM, dependency licenses, versions, links, and updater isolation
        run: npm run supply-chain:check
      - name: Audit npm dependencies
        run: npm audit --audit-level=high
      - name: Audit Rust dependencies
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ github.token }}
          working-directory: src-tauri
      - name: Verify repository hygiene
        run: npm run security:repo
      - name: Scan full Git history for secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: ${{ matrix.platform }} release package and installed smoke
    needs: supply-chain
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            bundles: deb,appimage
          - platform: windows
            os: windows-latest
            bundles: nsis
          - platform: macos
            os: macos-latest
            bundles: app,dmg
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Linux desktop and Secret Service dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dbus-x11 \
            gnome-keyring \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            xvfb

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-07-16
        with:
          components: rustfmt, clippy
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: src-tauri
      - name: Install locked dependencies
        run: npm ci

      - name: Run complete release quality gate
        shell: bash
        run: |
          set -o pipefail
          npm run check 2>&1 | tee "quality-gates-${{ matrix.platform }}.log"

      - name: Test Linux Secret Service contract in isolated D-Bus session
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -o pipefail
          bash scripts/ci/test-secret-store-linux.sh 2>&1 | tee secret-store-linux.log
      - name: Test Windows Credential Manager contract
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml --test ai_integration native_secret_store_contract -- --exact --nocapture 2>&1 | Tee-Object secret-store-windows.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        env:
          SKILL_STUDIO_PRO_NATIVE_SECRET_STORE_TEST: "1"
      - name: Test macOS Keychain contract
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -o pipefail
          SKILL_STUDIO_PRO_NATIVE_SECRET_STORE_TEST=1 cargo test --manifest-path src-tauri/Cargo.toml --test ai_integration native_secret_store_contract -- --exact --nocapture 2>&1 | tee secret-store-macos.log

      - name: Build unsigned Tauri installers
        run: npm run tauri -- build --ci --bundles ${{ matrix.bundles }}
      - name: Stage and hash installers
        run: node scripts/stage-release-assets.mjs --platform ${{ matrix.platform }} --bundle-root src-tauri/target/release/bundle --output release-assets/${{ matrix.platform }}

      - name: Smoke installed Windows NSIS application
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = (Get-ChildItem release-assets/windows -Filter '*.exe' -File | Select-Object -First 1).FullName
          ./scripts/ci/smoke-windows.ps1 -Installer $installer -Output release-assets/windows/smoke-windows.json
      - name: Smoke installed macOS DMG application
        if: runner.os == 'macOS'
        shell: bash
        run: bash scripts/ci/smoke-macos.sh "$(find release-assets/macos -maxdepth 1 -name '*.dmg' -print -quit)" release-assets/macos/smoke-macos.json
      - name: Smoke installed Linux deb application under Xvfb
        if: runner.os == 'Linux'
        shell: bash
        run: bash scripts/ci/smoke-linux.sh "$(find release-assets/linux -maxdepth 1 -name '*.deb' -print -quit)" release-assets/linux/smoke-linux.json

      - name: Add quality and Secret Store evidence
        shell: bash
        run: |
          cp "quality-gates-${{ matrix.platform }}.log" "release-assets/${{ matrix.platform }}/"
          cp "secret-store-${{ matrix.platform }}.log" "release-assets/${{ matrix.platform }}/"

      - name: Upload platform release evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.platform }}
          path: release-assets/${{ matrix.platform }}
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Verify downloaded hashes and publish prerelease
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - name: Download all platform artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: downloaded-artifacts
      - name: Verify platform manifests and assemble release assets
        run: node scripts/assemble-release-assets.mjs --input downloaded-artifacts --output publish-assets
      - name: Upload verified aggregate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: skill-studio-pro-v0.1.0-beta.1
          path: publish-assets
          if-no-files-found: error
          retention-days: 90
      - name: Require the release tag to match the application version
        if: startsWith(github.ref, 'refs/tags/')
        run: test "${GITHUB_REF_NAME}" = "v0.1.0-beta.1"
      - name: Create public beta prerelease
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" publish-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "Skill Studio Pro v0.1.0-beta.1" \
            --notes-file docs/release-notes.md \
            --prerelease \
            --verify-tag
