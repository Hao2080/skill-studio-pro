<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Skill Studio Pro</title>
  <desc id="desc">Three luminous layers forming an abstract S over a deep ocean field.</desc>
